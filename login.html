<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шалгалтын систем</title>

    <link rel="stylesheet" href="css/login-style.css">
    <link rel="stylesheet" href="css/components.css">

</head>

<body>
    <header class="login-header">
        <h1>Шалгалтын Систем</h1>
    </header>

    <main class="container">

        <section class="content">
            <div class="login-card">
                <div class="login-wrapper">
                    <p class="login-title">Админ хуудас</p>
                    <form id="loginForm" class="input-section">
                        <input type="email" id="email" class="input" placeholder="Enter your email" required>
                        <input type="password" id="password" class="input" placeholder="Enter your password" required>
                        <button type="submit" class="login-button btn-primary">Нэвтрэх</button>
                    </form>
                </div>
            </div>
        </section>


    </main>

    <footer>
        <p>© 2026 Examination App</p>
    </footer>

    <script src="js/login.js"></script>

</body>

</html>
